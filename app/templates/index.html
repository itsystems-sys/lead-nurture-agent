<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lead Nurture Engine</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #4ade80;
      --warn: #facc15;
      --err: #f87171;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }
    header {
      padding: 16px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.5px; }
    header .badge {
      font-size: 11px; color: var(--muted); border: 1px solid var(--border);
      padding: 4px 8px; border-radius: 999px;
    }
    nav.tabs {
      display: flex; gap: 4px; padding: 0 24px; background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    nav.tabs button {
      background: transparent; color: var(--muted); border: none;
      padding: 12px 16px; cursor: pointer; font-size: 14px;
      border-bottom: 2px solid transparent;
    }
    nav.tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; margin-bottom: 16px;
    }
    .panel h2 { margin-top: 0; font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .stat {
      background: var(--panel-2); border-radius: 6px; padding: 12px;
    }
    .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    .stat .value { font-size: 24px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .pill {
      display: inline-block; font-size: 11px; padding: 2px 8px;
      border-radius: 999px; background: var(--panel-2); color: var(--text);
    }
    .pill.ok { background: rgba(74,222,128,0.15); color: var(--ok); }
    .pill.warn { background: rgba(250,204,21,0.15); color: var(--warn); }
    .pill.err { background: rgba(248,113,113,0.15); color: var(--err); }
    .pill.info { background: rgba(56,189,248,0.15); color: var(--accent); }
    form.inline { display: inline; }
    input, select, textarea, button {
      font: inherit;
    }
    .form-grid {
      display: grid; gap: 8px; grid-template-columns: repeat(2, 1fr);
    }
    .form-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
    .form-grid input, .form-grid select {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px; padding: 8px;
    }
    button.btn {
      background: var(--accent); color: #0f172a; border: none; border-radius: 4px;
      padding: 8px 14px; font-weight: 600; cursor: pointer;
    }
    button.btn.ghost {
      background: transparent; color: var(--text); border: 1px solid var(--border);
    }
    button.btn.danger { background: var(--err); color: #0f172a; }
    .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    code { background: var(--panel-2); padding: 1px 6px; border-radius: 3px; font-size: 12px; }
    pre { background: var(--panel-2); padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
    .muted { color: var(--muted); }
    .empty { color: var(--muted); padding: 12px; text-align: center; font-style: italic; }

    /* HTMX in-flight feedback */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request .btn-label { display: none; }
    button[disabled], button.htmx-request {
      opacity: 0.6; cursor: progress;
    }
  </style>
</head>
<body>
  <header>
    <h1>Lead Nurture Engine</h1>
    <span class="badge">deterministic · no AI · JSON-backed</span>
  </header>

  <nav class="tabs" id="tabs">
    <button class="active" data-tab="dashboard"
            hx-get="/ui/dashboard" hx-target="#tab-content" hx-trigger="click, load">Dashboard</button>
    <button data-tab="leads"
            hx-get="/ui/leads" hx-target="#tab-content">Leads</button>
    <button data-tab="templates"
            hx-get="/ui/templates" hx-target="#tab-content">Templates</button>
    <button data-tab="jobs"
            hx-get="/ui/jobs" hx-target="#tab-content">Jobs</button>
    <button data-tab="logs"
            hx-get="/ui/logs" hx-target="#tab-content">Logs</button>
  </nav>

  <main>
    <div id="tab-content"></div>
  </main>

  <script>
    document.querySelectorAll('nav.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
</html>
